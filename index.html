<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* =======================
CANTIDADES
======================= */

function qty(id,val){

const el=document.getElementById(id);

let n=parseInt(el.innerText)+val;

if(n<0)n=0;

el.innerText=n;
}

/* =======================
WHATSAPP
======================= */

function cotizar(){

let msg="Hola Maderas Imbabura, deseo cotizar:\n\n";

const items=[

["Guadua Machacada","q1"],
["Tabla de Monte","q2"],
["Guadua Normal","q3"],
["Duela de Eucalipto","q4"],
["Viga de Madera","q5"],
["Pingo","q6"],
["Tirante","q7"]

];

let ok=false;

items.forEach(i=>{

const c=parseInt(document.getElementById(i[1]).innerText);

if(c>0){

msg+=`• ${i[0]}: ${c}\n`;

ok=true;
}

});

if(!ok){

alert("Seleccione un producto");

return;
}

window.open(
"https://wa.me/593962746147?text="+encodeURIComponent(msg),
"_blank"
);

}

/* =======================
TEXTURA NATURAL
======================= */

function woodMaterial(base=0xb07a45){

return new THREE.MeshPhysicalMaterial({

color:base,

roughness:.88,

metalness:0,

clearcoat:.08,

clearcoatRoughness:.9,

reflectivity:.15

});

}

/* =======================
VISOR REALISTA
======================= */

function createViewer(id,type){

const container=document.getElementById(id);

const scene=new THREE.Scene();

scene.background=null;

/* CAMERA */

const camera=new THREE.PerspectiveCamera(
40,
container.clientWidth/container.clientHeight,
0.1,
100
);

camera.position.set(0,0,5);

/* RENDER */

const renderer=new THREE.WebGLRenderer({

antialias:true,
alpha:true

});

renderer.setSize(
container.clientWidth,
container.clientHeight
);

renderer.setPixelRatio(
Math.min(window.devicePixelRatio,2)
);

renderer.outputEncoding=THREE.sRGBEncoding;

renderer.shadowMap.enabled=true;

renderer.shadowMap.type=THREE.PCFSoftShadowMap;

container.appendChild(renderer.domElement);

/* =======================
LUCES CINEMÁTICAS
======================= */

const hemi=new THREE.HemisphereLight(
0xffffff,
0xd7c2a3,
1.5
);

scene.add(hemi);

const dirLight=new THREE.DirectionalLight(
0xffffff,
1.4
);

dirLight.position.set(4,5,6);

dirLight.castShadow=true;

dirLight.shadow.mapSize.width=2048;
dirLight.shadow.mapSize.height=2048;

scene.add(dirLight);

const fill=new THREE.PointLight(
0xfff4dd,
0.6
);

fill.position.set(-4,2,3);

scene.add(fill);

/* =======================
SOMBRA SUELO
======================= */

const floor=new THREE.Mesh(

new THREE.CircleGeometry(5,64),

new THREE.ShadowMaterial({
opacity:.18
})

);

floor.rotation.x=-Math.PI/2;

floor.position.y=-1.2;

floor.receiveShadow=true;

scene.add(floor);

/* =======================
MODELOS
======================= */

let model;

/* GUADUA MACHACADA */

if(type==="machacada"){

model=new THREE.Group();

for(let i=0;i<14;i++){

const geo=new THREE.BoxGeometry(
0.14,
3,
0.045
);

const mat=woodMaterial(
0x9e6a38 + Math.random()*0x111111
);

const strip=new THREE.Mesh(geo,mat);

strip.castShadow=true;

strip.position.x=-0.95+(i*0.15);

strip.rotation.z=(Math.random()-.5)*0.06;

strip.rotation.x=(Math.random()-.5)*0.03;

for(let j=-1;j<=1;j++){

const node=new THREE.Mesh(

new THREE.BoxGeometry(
0.15,
0.05,
0.05
),

woodMaterial(0x6d4623)

);

node.position.y=j*0.95;

node.position.z=0.01;

strip.add(node);

}

model.add(strip);

}

model.rotation.x=.4;

}

/* TABLA */

if(type==="tabla"){

model=new THREE.Mesh(

new THREE.BoxGeometry(
3.1,
0.32,
0.24,
8,
2,
2
),

woodMaterial(0xb57843)

);

model.castShadow=true;

model.rotation.z=.08;

}

/* GUADUA NORMAL */

if(type==="guadua"){

model=new THREE.Group();

const bamboo=new THREE.Mesh(

new THREE.CylinderGeometry(
0.28,
0.34,
3.5,
64,
16,
true
),

new THREE.MeshPhysicalMaterial({

color:0x95a86b,

roughness:.9,

metalness:0,

clearcoat:.05

})

);

bamboo.rotation.z=Math.PI/2;

bamboo.castShadow=true;

model.add(bamboo);

/* NODOS */

for(let i=-1.2;i<=1.2;i+=0.6){

const ring=new THREE.Mesh(

new THREE.TorusGeometry(
0.31,
0.03,
24,
80
),

woodMaterial(0xc9a168)

);

ring.rotation.y=Math.PI/2;

ring.position.x=i;

ring.castShadow=true;

model.add(ring);

}

}

/* DUELA */

if(type==="duela"){

model=new THREE.Mesh(

new THREE.BoxGeometry(
3.2,
0.2,
0.12,
10,
2,
2
),

woodMaterial(0xd8b27c)

);

model.castShadow=true;

model.rotation.z=.04;

}

/* VIGA */

if(type==="viga"){

model=new THREE.Mesh(

new THREE.BoxGeometry(
2.8,
0.75,
0.75,
5,
5,
5
),

woodMaterial(0xa27042)

);

model.castShadow=true;

model.rotation.z=.08;

}

/* PINGO */

if(type==="pingo"){

model=new THREE.Mesh(

new THREE.CylinderGeometry(
0.18,
0.22,
3,
50
),

woodMaterial(0xd2ae7b)

);

model.rotation.z=Math.PI/2;

model.castShadow=true;

}

/* TIRANTE */

if(type==="tirante"){

model=new THREE.Mesh(

new THREE.CylinderGeometry(
0.32,
0.36,
3.3,
60
),

woodMaterial(0xc19761)

);

model.rotation.z=Math.PI/2;

model.castShadow=true;

}

scene.add(model);

/* =======================
INTERACCIÓN SUAVE
======================= */

let down=false;

let lastX=0;

container.addEventListener("mousedown",(e)=>{

down=true;

lastX=e.clientX;

});

window.addEventListener("mouseup",()=>{

down=false;

});

container.addEventListener("mousemove",(e)=>{

if(!down)return;

const dx=e.clientX-lastX;

model.rotation.y+=dx*0.008;

lastX=e.clientX;

});

/* TOUCH */

container.addEventListener("touchstart",(e)=>{

down=true;

lastX=e.touches[0].clientX;

});

window.addEventListener("touchend",()=>{

down=false;

});

container.addEventListener("touchmove",(e)=>{

if(!down)return;

const dx=e.touches[0].clientX-lastX;

model.rotation.y+=dx*0.008;

lastX=e.touches[0].clientX;

});

/* =======================
RESPONSIVE
======================= */

window.addEventListener("resize",()=>{

camera.aspect=
container.clientWidth/container.clientHeight;

camera.updateProjectionMatrix();

renderer.setSize(
container.clientWidth,
container.clientHeight
);

});

/* =======================
ANIMACIÓN PREMIUM
======================= */

function animate(){

requestAnimationFrame(animate);

if(!down){

model.rotation.y+=0.0025;

}

model.position.y=
Math.sin(Date.now()*0.001)*0.02;

renderer.render(scene,camera);

}

animate();

}

/* =======================
INIT
======================= */

window.addEventListener("DOMContentLoaded",()=>{

createViewer("viewer-machacada","machacada");

createViewer("viewer-tabla","tabla");

createViewer("viewer-guadua","guadua");

createViewer("viewer-duela","duela");

createViewer("viewer-viga","viga");

createViewer("viewer-pingo","pingo");

createViewer("viewer-tirante","tirante");

});

</script>
