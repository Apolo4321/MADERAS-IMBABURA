<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* =========================
CANTIDADES
========================= */

function qty(id,val){

const el=document.getElementById(id);

let n=parseInt(el.innerText)+val;

if(n<0)n=0;

el.innerText=n;
}

/* =========================
WHATSAPP
========================= */

function cotizar(){

let msg="Hola Maderas Imbabura, deseo cotizar:\n\n";

const items=[

["Guadua Machacada","q1"],
["Tabla de Monte","q2"],
["Guadua Normal","q3"],
["Duela de Eucalipto","q4"],
["Viga de Madera","q5"],
["Pingo","q6"],
["Tirante","q7"]

];

let ok=false;

items.forEach(i=>{

const c=parseInt(document.getElementById(i[1]).innerText);

if(c>0){

msg+=`• ${i[0]}: ${c}\n`;

ok=true;
}

});

if(!ok){

alert("Seleccione un producto");

return;
}

window.open(
"https://wa.me/593962746147?text="+encodeURIComponent(msg),
"_blank"
);

}

/* =========================
TEXTURA MADERA REALISTA
========================= */

function woodTexture(base="#b07a45",lines="#6b4423"){

const canvas=document.createElement("canvas");

canvas.width=512;
canvas.height=512;

const ctx=canvas.getContext("2d");

/* BASE */

ctx.fillStyle=base;
ctx.fillRect(0,0,512,512);

/* VETAS */

for(let i=0;i<220;i++){

ctx.beginPath();

ctx.strokeStyle=`rgba(60,30,10,${Math.random()*0.12})`;

ctx.lineWidth=Math.random()*3;

let y=i*3+Math.random()*20;

ctx.moveTo(0,y);

for(let x=0;x<512;x+=30){

ctx.lineTo(
x,
y+Math.sin(x*0.02+i)*8*Math.random()
);

}

ctx.stroke();

}

/* NUDOS */

for(let i=0;i<12;i++){

const x=Math.random()*512;
const y=Math.random()*512;

const r=10+Math.random()*30;

const grad=ctx.createRadialGradient(
x,y,2,
x,y,r
);

grad.addColorStop(0,"rgba(70,40,20,.5)");
grad.addColorStop(1,"rgba(0,0,0,0)");

ctx.fillStyle=grad;

ctx.beginPath();

ctx.arc(x,y,r,0,Math.PI*2);

ctx.fill();

}

const texture=new THREE.CanvasTexture(canvas);

texture.wrapS=THREE.RepeatWrapping;
texture.wrapT=THREE.RepeatWrapping;

return texture;
}

/* =========================
MATERIAL MADERA
========================= */

function woodMaterial(color1,color2){

return new THREE.MeshStandardMaterial({

map:woodTexture(color1,color2),

roughness:.82,

metalness:.02,

bumpScale:.03

});

}

/* =========================
VISOR REALISTA
========================= */

function createViewer(id,type){

const container=document.getElementById(id);

const scene=new THREE.Scene();

scene.background=null;

/* CAMERA */

const camera=new THREE.PerspectiveCamera(
38,
container.clientWidth/container.clientHeight,
0.1,
100
);

camera.position.set(0,0,6);

/* RENDER */

const renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setSize(
container.clientWidth,
container.clientHeight
);

renderer.setPixelRatio(
Math.min(window.devicePixelRatio,2)
);

renderer.outputEncoding=THREE.sRGBEncoding;

renderer.shadowMap.enabled=true;

container.appendChild(renderer.domElement);

/* LIGHTING */

const ambient=new THREE.AmbientLight(
0xffffff,
1.4
);

scene.add(ambient);

const light1=new THREE.DirectionalLight(
0xfff2dc,
1.4
);

light1.position.set(5,8,7);

scene.add(light1);

const light2=new THREE.DirectionalLight(
0xffffff,
0.5
);

light2.position.set(-5,-3,5);

scene.add(light2);

/* SOMBRA BASE */

const floor=new THREE.Mesh(

new THREE.CircleGeometry(2.2,40),

new THREE.ShadowMaterial({
opacity:.18
})

);

floor.rotation.x=-Math.PI/2;

floor.position.y=-1.4;

scene.add(floor);

/* MODELOS */

let model;

/* GUADUA MACHACADA */

if(type==="machacada"){

model=new THREE.Group();

for(let i=0;i<13;i++){

const strip=new THREE.Mesh(

new THREE.BoxGeometry(
0.12,
3,
0.05
),

woodMaterial("#9c6d3d","#6b4524")

);

strip.position.x=-0.9+(i*0.15);

strip.rotation.z=(Math.random()-.5)*0.05;

strip.rotation.x=(Math.random()-.5)*0.02;

model.add(strip);

/* NODOS */

for(let j=-1;j<=1;j++){

const node=new THREE.Mesh(

new THREE.BoxGeometry(
0.14,
0.05,
0.06
),

woodMaterial("#6f4724","#4b2b12")

);

node.position.y=j*0.9;

strip.add(node);

}

}

model.rotation.x=.55;

}

/* TABLA */

if(type==="tabla"){

model=new THREE.Mesh(

new THREE.BoxGeometry(
3,
0.32,
0.24
),

woodMaterial("#a36a3f","#6e4324")

);

model.rotation.z=.08;
model.rotation.x=.08;

}

/* GUADUA */

if(type==="guadua"){

model=new THREE.Group();

const body=new THREE.Mesh(

new THREE.CylinderGeometry(
0.32,
0.34,
3.5,
64,
32,
true
),

woodMaterial("#8f9e67","#5f6e44")

);

body.rotation.z=Math.PI/2;

model.add(body);

/* NODOS */

for(let i=-1.2;i<=1.2;i+=0.6){

const ring=new THREE.Mesh(

new THREE.TorusGeometry(
0.34,
0.03,
20,
80
),

woodMaterial("#c5a06b","#8a6038")

);

ring.rotation.y=Math.PI/2;

ring.position.x=i;

model.add(ring);

}

}

/* DUELA */

if(type==="duela"){

model=new THREE.Mesh(

new THREE.BoxGeometry(
3,
0.18,
0.15
),

woodMaterial("#d8b07a","#8e5f33")

);

model.rotation.z=.05;

}

/* VIGA */

if(type==="viga"){

model=new THREE.Mesh(

new THREE.BoxGeometry(
2.8,
0.75,
0.75
),

woodMaterial("#9b6539","#5f381d")

);

model.rotation.z=.08;

}

/* PINGO */

if(type==="pingo"){

model=new THREE.Mesh(

new THREE.CylinderGeometry(
0.18,
0.2,
3,
50
),

woodMaterial("#d9b37f","#8f643a")

);

model.rotation.z=Math.PI/2;

}

/* TIRANTE */

if(type==="tirante"){

model=new THREE.Mesh(

new THREE.CylinderGeometry(
0.32,
0.34,
3.2,
60
),

woodMaterial("#c59c68","#6f4727")

);

model.rotation.z=Math.PI/2;

}

/* SOMBRAS */

model.castShadow=true;

scene.add(model);

/* ROTACIÓN SUAVE */

let down=false;

let lastX=0;

container.addEventListener("mousedown",(e)=>{

down=true;

lastX=e.clientX;

});

window.addEventListener("mouseup",()=>{

down=false;

});

container.addEventListener("mousemove",(e)=>{

if(!down)return;

const dx=e.clientX-lastX;

model.rotation.y+=dx*0.01;

lastX=e.clientX;

});

/* TOUCH */

container.addEventListener("touchstart",(e)=>{

down=true;

lastX=e.touches[0].clientX;

});

window.addEventListener("touchend",()=>{

down=false;

});

container.addEventListener("touchmove",(e)=>{

if(!down)return;

const dx=e.touches[0].clientX-lastX;

model.rotation.y+=dx*0.01;

lastX=e.touches[0].clientX;

});

/* ANIMACIÓN */

function animate(){

requestAnimationFrame(animate);

if(!down){

model.rotation.y+=0.0025;

}

renderer.render(scene,camera);

}

animate();

/* RESPONSIVE */

window.addEventListener("resize",()=>{

camera.aspect=
container.clientWidth/container.clientHeight;

camera.updateProjectionMatrix();

renderer.setSize(
container.clientWidth,
container.clientHeight
);

});

}

/* INIT */

window.addEventListener("DOMContentLoaded",()=>{

createViewer("viewer-machacada","machacada");

createViewer("viewer-tabla","tabla");

createViewer("viewer-guadua","guadua");

createViewer("viewer-duela","duela");

createViewer("viewer-viga","viga");

createViewer("viewer-pingo","pingo");

createViewer("viewer-tirante","tirante");

});

</script>
